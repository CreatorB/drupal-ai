drupal_ai_search.settings:
  type: config_object
  label: 'Drupal AI Search settings'
  mapping:
    opencode_api_key:
      type: string
      label: 'OpenCode API key'
    opencode_endpoint:
      type: string
      label: 'OpenCode API endpoint'
    opencode_model:
      type: string
      label: 'Primary model'
    opencode_fallback_model:
      type: string
      label: 'Fallback model'
    provider_name:
      type: string
      label: 'Provider name'
    provider_site_url:
      type: string
      label: 'Provider site URL'
    provider_app_name:
      type: string
      label: 'Provider app name'
    opencode_embedding_model:
      type: string
      label: 'Embedding model'
    enable_embeddings:
      type: boolean
      label: 'Enable embeddings'
    libretranslate_endpoint:
      type: string
      label: 'LibreTranslate endpoint'
    result_limit:
      type: integer
      label: 'Result limit'
    cache_ttl:
      type: integer
      label: 'Cache TTL'
    api_timeout:
      type: integer
      label: 'API timeout'
    search_prompt:
      type: text
      label: 'Prompt template'
